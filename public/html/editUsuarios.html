<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Config</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #3d5166;
            --navy-dark: #2e3f52;
            --accent: #5c7a96;
            --bg: #f0f3f6;
            --surface: #ffffff;
            --border: #c8d3dd;
            --text: #1e2d3d;
            --muted: #7a8fa0;
            --btn-bg: #8ca4b8;
            --btn-hover: #6e8fa8;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        nav {
            background: var(--navy);
            display: flex;
            align-items: center;
            padding: 0 28px;
            height: 72px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            margin-right: auto;
        }

        /* fallback placeholder if image missing */
        .nav-logo svg {
            width: 52px;
            height: 52px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 48px;
            list-style: none;
            margin-right: 40px;
        }

        .nav-links a {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #d4dfe9;
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: color .2s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .nav-links a.active {
            color: #fff;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .nav-profile {
            cursor: pointer;
        }

        .nav-profile svg {
            width: 40px;
            height: 40px;
        }

        /* ── MAIN ── */
        main {
            max-width: 1100px;
            margin: 44px auto;
            padding: 0 24px;
        }

        /* ── TOP BAR ── */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 28px;
        }

        .btn-nuevo {
            background: var(--btn-bg);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 11px 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .02em;
            transition: background .2s, transform .1s;
        }

        .btn-nuevo:hover {
            background: var(--btn-hover);
        }

        .btn-nuevo:active {
            transform: scale(.97);
        }

        /* ── TABLE ── */
        .table-wrapper {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(61, 81, 102, .07);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* column widths */
        col.col-id {
            width: 140px;
        }

        /* col.col-nombre {
            width: 22%;
        } */

        col.col-correo {
            width: 32%;
        }

        col.col-createDate {
            width: 30%;
        }

        col.col-action {
            width: 56px;
        }

        thead th {
            background: var(--surface);
            padding: 14px 20px;
            text-align: center;
            font-family: 'Syne', sans-serif;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: .05em;
            border-bottom: 2px solid var(--border);
        }

        thead th:first-child {
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f5f8fb;
        }

        tbody td {
            padding: 14px 20px;
            font-size: .9rem;
            color: var(--text);
            text-align: center;
            vertical-align: middle;
        }

        td.td-correo {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
            font-size: .88rem;
            word-break: break-all;
        }

        td.td-correo:hover {
            color: var(--navy);
        }

        td.td-action {
            text-align: center;
            padding: 0 12px;
        }

        .btn-gear {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text);
            padding: 6px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, color .15s, transform .15s;
        }

        .btn-gear:hover {
            background: var(--bg);
            color: var(--navy);
            transform: rotate(30deg);
        }

        .btn-gear svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .edit-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 45, 61, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease;
        }

        .edit-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .edit-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 32px 28px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(30, 45, 61, 0.18);
            display: flex;
            flex-direction: column;
            gap: 0;
            transform: translateY(12px);
            transition: transform .2s ease;
        }

        .edit-overlay.open .edit-card {
            transform: translateY(0);
        }

        .edit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .edit-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: .02em;
        }

        .edit-user-id {
            font-size: .78rem;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 3px 10px;
        }

        .edit-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .edit-field label {
            font-size: .8rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .edit-field input {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: .92rem;
            color: var(--text);
            transition: border-color .2s;
            width: 100%;
        }

        .edit-field input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .edit-field input::placeholder {
            color: var(--muted);
        }

        .edit-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-save {
            width: 100%;
            background: var(--btn-bg);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 11px 0;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .02em;
            transition: background .2s, transform .1s;
        }

        .btn-save:hover {
            background: var(--btn-hover);
        }

        .btn-save:active {
            transform: scale(.97);
        }

        .btn-delete {
            width: 100%;
            background: transparent;
            border: 1.5px solid #e2b8b8;
            border-radius: 999px;
            padding: 10px 0;
            font-family: 'DM Sans', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            color: #a03030;
            cursor: pointer;
            letter-spacing: .02em;
            transition: background .2s, border-color .2s, color .2s;
        }

        .btn-delete:hover {
            background: #a03030;
            border-color: #a03030;
            color: #fff;
        }

        .btn-close-edit {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color .15s, background .15s;
        }

        .btn-close-edit:hover {
            background: var(--bg);
            color: var(--text);
        }

        .edit-user-id {
        /* existing rules… */
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        }
    </style>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/userModal.css">
</head>

<body>

    <!-- ── NAVBAR ── -->
    <nav class="headerContainer">
        <div class="nav-logo">
            <img src='../static/Logo trazabilidad.svg' alt="Logo">
        </div>

        <ul class="nav-links">
            <li><a href="#">Realizar registro</a></li>
            <li><a href="/busqueda">Ver registros</a></li>
            <li><a href="/editUsers" class="active">Administracion</a></li>
        </ul>

        <div id="profileBtn" class="nav-profile">
            <!-- Profile / user icon -->
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="19" stroke="#a8c0d6" stroke-width="1.8" fill="none" />
                <circle cx="20" cy="16" r="6" fill="#a8c0d6" />
                <path d="M8 34c0-6.627 5.373-10 12-10s12 3.373 12 10" fill="#a8c0d6" />
            </svg>
        </div>
    </nav>

    <!-- ── MAIN ── -->
    <main>

        <div class="top-bar">
            <button class="btn-nuevo" id="btnNuevoUsuario">Nuevo usuario</button>
        </div>

        <div class="table-wrapper">
            <table>
                <colgroup>
                    <col class="col-id" />
                    <!-- <col class="col-nombre" /> -->
                    <col class="col-correo" />
                    <!-- <col class="col-puesto" /> -->
                    <col class="col-createDate" />
                    <col class="col-action" />
                </colgroup>
                <thead>
                    <tr>
                        <th>ID</th>
                        <!-- <th>Nombre</th> -->
                        <th>Correo</th>
                        <th>Fecha de creacion</th>
                        <!-- <th>Puesto</th> -->
                        <th></th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- rows injected by JS -->
                </tbody>
            </table>
        </div>

    </main>

    <!-- ── PROFILE MODAL ── -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <div class="modal-avatar">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="16" r="7" fill="#a8c0d6" />
                    <path d="M6 38c0-7.732 6.268-12 14-12s14 4.268 14 12" fill="#a8c0d6" />
                </svg>
            </div>
            <span class="modal-name" id="modalName">Nombre de usuario</span>
            <span class="modal-email" id="modalEmail">usuario@correo.com</span>
            <div class="modal-divider"></div>
            <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
        </div>
    </div>

    <!-- EDIT USER MODAL -->
    <div class="edit-overlay" id="editModal">
        <div class="edit-card">
            <div class="edit-header">
                <span class="edit-title" id="editModalTitle">Editar usuario</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="edit-user-id" id="editUserId">ID: —</span>
                    <button class="btn-close-edit" id="btnCloseEdit" title="Cerrar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="edit-field">
                <label for="editEmail">Correo</label>
                <input type="email" id="editEmail" placeholder="usuario@correo.com" autocomplete="off" />
            </div>

            <div class="edit-field">
                <label for="editPassword">Contraseña</label>
                <input type="password" id="editPassword" placeholder="Nueva contraseña" autocomplete="new-password" />
            </div>

            <div class="edit-actions">
                <button class="btn-save" id="btnSaveUser">Guardar cambios</button>
                <button class="btn-delete" id="btnDeleteUser">Eliminar usuario</button>
            </div>
        </div>
    </div>
    <script src="../JS/userModal.js" type="module"></script>
    <script src="../JS/editUsuarios.js" type="module"></script>

</body>

</html>
