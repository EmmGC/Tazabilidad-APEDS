<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Config</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/editUsuarios.css">
    <link rel="stylesheet" href="../css/userModal.css">
</head>

<body>

    <!-- ── NAVBAR ── -->
    <nav class="headerContainer">
        <div class="nav-logo">
            <img src='../static/Logo trazabilidad.svg' alt="Logo">
        </div>

        <ul class="nav-links">
            <li><a href="/registro">Realizar registro</a></li>
            <li><a href="/busqueda">Ver registros</a></li>
            <li><a href="/editUsers" class="active">Administracion</a></li>
        </ul>
        <div id="profileBtn" class="nav-profile">
            <!-- Profile / user icon -->
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="19" stroke="#a8c0d6" stroke-width="1.8" fill="none" />
                <circle cx="20" cy="16" r="6" fill="#a8c0d6" />
                <path d="M8 34c0-6.627 5.373-10 12-10s12 3.373 12 10" fill="#a8c0d6" />
            </svg>
        </div>
    </nav>

    <!-- ── MAIN ── -->
    <main>

        <div class="top-bar">
            <button class="btn-nuevo" id="btnNuevoUsuario">Nuevo usuario</button>
        </div>

        <div class="table-wrapper">
            <table>
                <colgroup>
                    <col class="col-id" />
                    <!-- <col class="col-nombre" /> -->
                    <col class="col-correo" />
                    <!-- <col class="col-puesto" /> -->
                    <col class="col-createDate" />
                    <col class="col-action" />
                </colgroup>
                <thead>
                    <tr>
                        <th>ID</th>
                        <!-- <th>Nombre</th> -->
                        <th>Correo</th>
                        <th>Fecha de creacion</th>
                        <!-- <th>Puesto</th> -->
                        <th></th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- rows injected by JS -->
                </tbody>
            </table>
        </div>

    </main>

    <!-- ── PROFILE MODAL ── -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <div class="modal-avatar">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="16" r="7" fill="#a8c0d6" />
                    <path d="M6 38c0-7.732 6.268-12 14-12s14 4.268 14 12" fill="#a8c0d6" />
                </svg>
            </div>
            <span class="modal-name" id="modalName">Nombre de usuario</span>
            <span class="modal-email" id="modalEmail">usuario@correo.com</span>
            <div class="modal-divider"></div>
            <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
        </div>
    </div>

    <!-- EDIT USER MODAL -->
    <div class="edit-overlay" id="editModal">
        <div class="edit-card">
            <div class="edit-header">
                <span class="edit-title" id="editModalTitle">Editar usuario</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="edit-user-id" id="editUserId">ID: —</span>
                    <button class="btn-close-edit" id="btnCloseEdit" title="Cerrar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="edit-field">
                <label for="editEmail">Correo</label>
                <input type="email" id="editEmail" placeholder="usuario@correo.com" autocomplete="off" />
            </div>

            <div class="edit-field">
                <label for="editPassword">Contraseña</label>
                <input type="password" id="editPassword" placeholder="Nueva contraseña" autocomplete="new-password" />
            </div>

            <div class="edit-actions">
                <button class="btn-save" id="btnSaveUser">Guardar cambios</button>
                <button class="btn-delete" id="btnDeleteUser">Eliminar usuario</button>
            </div>
        </div>
    </div>
    <script src="../JS/userModal.js" type="module"></script>
    <script src="../JS/editUsuarios.js" type="module"></script>

</body>

</html>
