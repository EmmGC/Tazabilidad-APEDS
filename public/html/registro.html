<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realizar Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/registro.css">
  <link rel="stylesheet" href="../css/userModal.css">
</head>

<body>

  <!-- ── NAVBAR ── -->
  <nav class="headerContainer">
    <div class="nav-logo">
      <img src='../static/Logo trazabilidad.svg' alt="Logo">
    </div>

    <ul class="nav-links">
      <li><a href="/registro" class="active">Realizar registro</a></li>
      <li><a href="/busqueda">Ver registros</a></li>
      <li><a href="/editUsers">Administracion</a></li>
    </ul>

    <div id="profileBtn" class="nav-profile">
      <!-- Profile / user icon -->
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" stroke="#a8c0d6" stroke-width="1.8" fill="none" />
        <circle cx="20" cy="16" r="6" fill="#a8c0d6" />
        <path d="M8 34c0-6.627 5.373-10 12-10s12 3.373 12 10" fill="#a8c0d6" />
      </svg>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main>
    <div class="registration-header">
        <h1>Realizar Nuevo Registro</h1>
        <div class="selector-wrapper">
            <label for="formSelector">¿Qué formulario deseas llenar?</label>
            <select id="formSelector" class="filter-select">
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="proveedores">Proveedores</option>
                <option value="insumos_agricolas">Insumos Agrícolas</option>
                <option value="unidades_produccion">Unidades de Producción</option>
                <option value="secciones_cultivo">Secciones de Cultivo</option>
                <option value="clientes_destinos">Clientes y Destinos</option>
                <option value="transportes">Transportes</option>
            </select>
        </div>
    </div>

    <div id="formContainer" class="form-card" style="display: none;">
        <form id="dynamicForm">
            <div id="formFields" class="form-grid">
                <!-- Los campos se generarán dinámicamente aquí -->
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-ejecutar">Guardar Registro</button>
            </div>
        </form>
    </div>
  </main>

  <!-- Modal de usuario -->
  <div class="modal-overlay" id="profileModal">
    <div class="modal-card">
      <div class="modal-avatar">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="16" r="7" fill="#a8c0d6" />
          <path d="M6 38c0-7.732 6.268-12 14-12s14 4.268 14 12" fill="#a8c0d6" />
        </svg>
      </div>
      <span class="modal-name" id="modalName">Nombre de usuario</span>
      <span class="modal-email" id="modalEmail">usuario@correo.com</span>
      <div class="modal-divider"></div>
      <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
    </div>
  </div>

  <script src="../JS/registro.js" type="module"></script>
  <script src="../JS/userModal.js" type="module"></script>
</body>

</html>
